<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABOUT YOURSELF</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
}

.card{
    width:450px;
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 20px 40px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:10px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#16a34a;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.pay-btn{
    display:none;
    margin-top:20px;
    text-align:center;
    background:#2563eb;
    color:white;
    text-decoration:none;
    padding:15px;
    border-radius:10px;
}

.details{
    margin-top:20px;
    text-align:center;
}

.amount{
    font-size:28px;
    font-weight:bold;
}

.upi{
    color:#666;
}
</style>
</head>
<body>

<div class="card">

    <h1>UPI Payment</h1>

    <input
        type="text"
        id="upi"
        placeholder="Your name"
    >

    <input
        type="number"
        id="amount"
        placeholder="Number"
    >

    <button onclick="createPayment()">
        Create User
    </button>

    <div class="details">
        <div class="amount" id="amountDisplay"></div>
        <div class="upi" id="upiDisplay"></div>
    </div>

    <a
        id="payBtn"
        class="pay-btn"
    >
        Save Data
    </a>

</div>

<script>

function createPayment(){

    const upi =
        document.getElementById("upi").value.trim();

    const amount =
        document.getElementById("amount").value.trim();

    if(!upi || !amount){
        alert("Enter UPI ID and Amount");
        return;
    }

    const upiLink =
    `upi://pay?pa=${encodeURIComponent(upi)}&pn=Merchant&am=${amount}&cu=INR`;

    document.getElementById("amountDisplay")
        .innerText = "₹" + amount;

    document.getElementById("upiDisplay")
        .innerText = upi;

    const payBtn =
        document.getElementById("payBtn");

    payBtn.href = upiLink;
    payBtn.style.display = "block";
}

</script>

</body>
</html>
